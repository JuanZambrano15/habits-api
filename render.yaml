databases:
  - name: habits-db
    plan: free
    databaseName: habits_db
    user: habits_user

services:
  - type: web
    name: habits-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/schema/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: habits-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: habits-db
          property: connectionString