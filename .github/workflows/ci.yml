name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: habits_db
          POSTGRES_USER: habits_user
          POSTGRES_PASSWORD: habits_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U habits_user -d habits_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DEBUG: "True"
      SECRET_KEY: "clave-de-prueba-solo-para-ci"
      DB_NAME: habits_db
      DB_USER: habits_user
      DB_PASSWORD: habits_pass
      DB_HOST: localhost
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr tests con cobertura
        run: pytest --cov=apps --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: test   # este job solo corre si "test" pasa primero

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t habits-api:ci .