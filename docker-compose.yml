services:
  db:
    image: postgres:16
    container_name: habits_db
    environment:
      POSTGRES_DB: habits_db
      POSTGRES_USER: habits_user
      POSTGRES_PASSWORD: habits_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: habits_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: